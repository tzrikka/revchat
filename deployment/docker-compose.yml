name: revchat

x-logging: &loki-logging
  logging:
    driver: loki
    options:
      loki-url: http://host.docker.internal:${LOKI_PORT:-3100}/loki/api/v1/push
      mode: non-blocking
      max-buffer-size: 4m
      loki-retries: "3"

services:
  otel-lgtm:
    container_name: otel-lgtm
    image: grafana/otel-lgtm:latest
    volumes:
      - ./otel-lgtm-config/otel-collector.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - otel-lgtm-data:/data:rw
    networks:
      - revchat-network
    expose:
      - 4040 # Pyroscope
      - 4317 # OTLP gRPC
      - 4318 # OTLP HTTP
      - 9090 # Prometheus
    ports:
      - ${GRAFANA_PORT:-3000}:3000 # Grafana UI
      - ${LOKI_PORT:-3100}:3100 # Loki
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS_AUTH_ENABLED:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GRAFANA_ANONYMOUS_AUTH_ORG_ROLE:-Admin}
      - GF_AUTH_DISABLE_LOGIN_FORM=${GRAFANA_DISABLE_LOGIN_FORM:-false}
      - GF_USERS_ALLOW_SIGN_UP=false
    healthcheck:
      test: test -f /tmp/ready || exit 1
      timeout: 3s
      start_period: 30s
    restart: unless-stopped

  postgresql:
    container_name: postgres
    image: postgres:${POSTGRES_VERSION}
    volumes:
      - postgres-data:/var/lib/postgresql:rw
    networks:
      - revchat-network
    expose:
      - ${POSTGRES_PORT:-5432}
    environment:
      - PGPORT=${POSTGRES_PORT:-5432}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-temporal}
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_DB=${POSTGRES_DB:-temporal}
    healthcheck:
      test: pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER} || exit 1
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  temporal-setup-postgres:
    <<: *loki-logging
    container_name: temporal-setup-postgres
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    volumes:
      - ./temporal/scripts:/scripts:ro
    networks:
      - revchat-network
    depends_on:
      otel-lgtm:
        condition: service_healthy
      postgresql:
        condition: service_healthy
    environment:
      - SQL_PLUGIN=postgres12
      - SQL_HOST=postgresql
      - SQL_PORT=${POSTGRES_PORT:-5432}
      - SQL_USER=${POSTGRES_USER:-temporal}
      - SQL_PASSWORD=${POSTGRES_PASSWORD:-temporal}
      - SQL_DATABASE=${POSTGRES_DB:-temporal}
    entrypoint: [ "/bin/sh" ]
    command: /scripts/setup-postgres.sh

  temporal:
    <<: *loki-logging
    container_name: temporal
    image: temporalio/server:${TEMPORAL_SERVER_VERSION}
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:rw
    networks:
      - revchat-network
    expose:
      - 7233 # gRPC API
      - 8000 # Metrics
    ports:
      - ${TEMPORAL_SERVER_PORT:-7233}:7233
    # https://hub.docker.com/r/temporalio/server
    environment:
      - DB=postgres12
      - POSTGRES_SEEDS=postgresql
      - DB_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-temporal}
      - DBNAME=${POSTGRES_DB:-temporal}
      - VISIBILITY_POSTGRES_SEEDS=postgresql
      - VISIBILITY_DB_PORT=${POSTGRES_PORT:-5432}
      - VISIBILITY_DBNAME=${POSTGRES_DB:-temporal}_visibility
      - VISIBILITY_POSTGRES_USER=${POSTGRES_USER:-temporal}
      - VISIBILITY_POSTGRES_PWD=${POSTGRES_PASSWORD:-temporal}
      - BIND_ON_IP=0.0.0.0
      - PROMETHEUS_ENDPOINT=0.0.0.0:8000
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      temporal-setup-postgres:
        condition: service_completed_successfully
    healthcheck:
      test: nc -z localhost 7233 || exit 1
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  temporal-setup-server:
    container_name: temporal-setup-server
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    volumes:
      - ./temporal/scripts:/scripts:ro
    networks:
      - revchat-network
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - NAMESPACE=${TEMPORAL_NAMESPACE:-default}
    entrypoint: [ "/bin/sh" ]
    command: /scripts/setup-server.sh

  temporal-validate:
    container_name: temporal-validate
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    volumes:
      - ./temporal/scripts:/scripts:ro
    networks:
      - revchat-network
    depends_on:
      temporal-setup-server:
        condition: service_completed_successfully
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - MAX_WAIT_TIME=300
    entrypoint: [ "/bin/sh", "-c" ]
    command: [ "exec /scripts/validate-temporal.sh" ]
    restart: on-failure:5

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:latest
    networks:
      - revchat-network
    ports:
      - ${TEMPORAL_UI_PORT:-8233}:8080
    # https://hub.docker.com/r/temporalio/ui#environment-variables
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
      - TEMPORAL_DEFAULT_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  thrippy:
    <<: *loki-logging
    container_name: thrippy
    image: ghcr.io/tzrikka/thrippy:latest
    volumes:
      - ./thrippy-config:/home/nonroot/.config/thrippy:ro
      - thrippy-data:/home/nonroot/.local/share/thrippy:rw
    networks:
      - revchat-network
    expose:
      - 14460
      - 14470
    environment:
      - THRIPPY_WEBHOOK_ADDRESS=${WEBHOOK_ADDRESS}
    depends_on:
      otel-lgtm:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "./thrippy", "health-check" ]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  timpani:
    <<: *loki-logging
    container_name: timpani
    image: ghcr.io/tzrikka/timpani:latest
    volumes:
      - ./timpani-config:/home/nonroot/.config/timpani:ro
      - timpani-data:/home/nonroot/.local/share/timpani:rw
    networks:
      - revchat-network
    ports:
      - ${TIMPANI_PORT:-14480}:14480
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - THRIPPY_LINK_BITBUCKET=${TIMPANI_THRIPPY_LINK_BITBUCKET}
      - THRIPPY_LINK_JIRA=${TIMPANI_THRIPPY_LINK_JIRA}
      - THRIPPY_LINK_GITHUB=${TIMPANI_THRIPPY_LINK_GITHUB}
      - THRIPPY_LINK_SLACK=${TIMPANI_THRIPPY_LINK_SLACK}
    depends_on:
      temporal-validate:
        condition: service_completed_successfully
      thrippy:
        condition: service_healthy
    restart: unless-stopped

networks:
  revchat-network:
    driver: bridge

volumes:
  otel-lgtm-data:
    name: revchat-otel-lgtm-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUME_OTEL_LGTM_DATA}
  postgres-data:
    name: revchat-postgres-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUME_POSTGRES_DATA}
  revchat-data:
    name: revchat-revchat-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUME_REVCHAT_DATA}
  thrippy-data:
    name: revchat-thrippy-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUME_THRIPPY_DATA}
  timpani-data:
    name: revchat-timpani-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VOLUME_TIMPANI_DATA}
