extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /ready

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: opentelemetry-collector
          scrape_interval: 1s
          static_configs:
            - targets: [ 127.0.0.1:8888 ]

processors:
  batch:

exporters:
  otlp_http/traces:
    endpoint: http://127.0.0.1:4418
    tls:
      insecure: true
  otlp_http/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true
  otlp_http/logs:
    endpoint: http://127.0.0.1:3100/otlp
    tls:
      insecure: true
  otlp_http/profiles:
    endpoint: http://127.0.0.1:4040
    tls:
      insecure: true
  debug/traces:
    verbosity: detailed
  debug/metrics:
    verbosity: detailed
  debug/logs:
    verbosity: detailed

service:
  extensions: [ health_check ]
  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp_http/traces ]
    metrics:
      receivers: [ otlp, prometheus/collector ]
      processors: [ batch ]
      exporters: [ otlp_http/metrics ]
    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp_http/logs ]
    profiles:
      receivers: [ otlp ]
      exporters: [ otlp_http/profiles ]
